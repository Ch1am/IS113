<body>

    <script>

        // Write a function getOperation(op) that returns an addition function if op === "add",
        // a multiplication function if op === "mul", or
        // a default function returning NaN.

        function getOperation(op) {
            // YOUR CODE GOES HERE
            if (op === "add") {
                return (a, b) => a + b;
            } else if (op === "mul") {
                return (a, b) => a * b;
            } else {
                return () => NaN;
            }
        }

        const addFn = getOperation("add");
        console.log(addFn(2, 3)); // Output: 5

        const multiFn = getOperation("mul");
        console.log(multiFn(2, 3)); // Output: 6
        
    </script>
    
</body>
