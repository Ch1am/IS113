<body>

    <script>

        // Define a function greet(name) that returns "Hello, <name>".
        // Then assign a property language = "English" to the function and 
        // print both the function output and the property.

        // YOUR CODE GOES HERE
        function greet(name) {
            return `Hello, ${name}`;
        }

        greet.language = "English";

        console.log(greet("Sam"));          // Output: Hello, Sam
        console.log(greet.language);        // Output: English
        
    </script>
    
</body>
