    <script>

        // Write a function that reverses the digits of a number using a while loop.
        // Example: reverseDigits(1234) → 4321

        function reverseDigits(num) {
            // YOUR CODE GOES HERE
            let reversed = 0;
            while (num > 0) {
                reversed = reversed * 10 + (num % 10);
                num = Math.floor(num / 10);
            }
            return reversed;
        }

        console.log( reverseDigits(1234) );

    </script>
