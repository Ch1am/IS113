<body>

    <script>

        // Write a function that filters out odd numbers from an array.

        function keepEvens(arr) {
            // YOUR CODE GOES HERE
            return arr.filter(x => x % 2 === 0);
        }
        
        let arr = [ 1, 2, 3, 4, 5 ];

        console.log( keepEvens(arr) );
        
    </script>
