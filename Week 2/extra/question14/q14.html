<body>

    <script>

        // Write a function that counts the number of vowels in a string.
        // Use a for...of loop.

        function countVowels(str) {
            // YOUR CODE GOES HERE
            let count = 0;
            const vowels = "aeiouAEIOU";
            for (const char of str) {
                if (vowels.includes(char)) count++;
            }
            return count;
        }
        
        console.log( countVowels("Hello World") );

    </script>
