		try {
			let firstNumber = Number(prompt("Please provide the first number"));
			let secondNumber = Number(prompt("Please provide the second number"));
			let num1 = parseInt(firstNumber);
			let num2 = parseInt(secondNumber);
			if (isNaN(num1) || isNaN(num2)) {
				throw new Error("Invalid number");
			}
			var sum = num1 + num2;
		}
		catch (err) {
			alert("Invalid number given");
		}
		finally {
			alert(sum);
		}
