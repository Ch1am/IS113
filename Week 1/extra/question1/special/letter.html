<!DOCTYPE html>
<html>

<Head>
    <title>Letter to Justin Babe</title>
</Head>



<body>

    <!-- Part F -->
    <h1>Send Your Love to Justin</h1>

    <img src="../images/justin4.gif">


    <form>
        <label for="fname" style="font-size: 20;">Full Name:</label>
        <input type="text" id="fname" name="fname">
        <br>
        <label for="age">Age:</label>
        <input type="number" min="0" id="age" name="age">
        <br>
        <label for="gender">Gender:</label>
        <select id='gender' name="gender">
            <option value="Male" selected>Male</option>
            <option value="Female">Female</option>
        </select>
        <br>
        <label for="status">Relationship Status (please be truthful):</label><br>
        <input type="radio" id="single" name="status" value="Single">
        <label for="single">Single</label><br>
        <input type="radio" id="attached" name="status" value="Attached">
        <label for="attached">Attached</label><br>
        <input type="radio" id="complicated" name="status" value="Complicated">
        <label for="complicated">Complicated</label><br>

        <label for="songs[]">Favorite Justin Songs: </label>
        <br>
        <input type="checkbox" id="sorry" name="songs[]" value="Sorry">
        <label for="sorry">Sorry</label><br>
        <input type="checkbox" id="baby" name="songs[]" value="Baby">
        <label for="baby">Baby</label><br>
        <input type="checkbox" id="boyfriend" name="songs[]" value="Boyfriend">
        <label for="boyfriend">Boyfriend</label><br>
        <input type="checkbox" id="letlove" name="songs[]" value="Let Me Love You">
        <label for="letlove">Let Me Love You</label><br>
        <input type="checkbox" id="idc" name="songs[]" value="I Don't Care">
        <label for="idc">I Don't Care</label><br>
        <label for="comment">Message to Justin:</label>
        <br>
        <textarea id="comment" name="comment" rows="3" cols="50"> </textarea>
        <br>
        <button type="submit">Send My Love to Justin!</button>


    </form>

    <!-- Hyperlink BACK to justin.html -->
    <!-- <hr> is a Horizontal Line element - it spans 100% across the width of the browser window -->
    <hr>
    <a href="../justin.html">Back </a>to Justin Fan Page

</body>

</html>
