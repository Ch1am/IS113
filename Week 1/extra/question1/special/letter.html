<!DOCTYPE html>
<html>
<Head>
    <title>Letter to Justin Babe</title> 
</Head>



<body>

    <!-- Part F -->
    <h2>Send Your Love to Justin</h2>
    
    <img src="../images/justin4.gif" >


    <form>
        <table>
            <tr>
                <td><label for="fname">Full Name:</label></td>
                <td><input type="text" id="fname" name="fname" placeholder="Enter Your Full Name"></td>
            </tr>
            <tr>
                <td><label for="age">Age:</label></td>
                <td><input type="number" id="age" name="age"></td>
            </tr>
            <tr>
                <td><label for="gender">Gender:</label></td>
                <td>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>

                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                </td>
            </tr>
            <tr>
                <td><label for="gender">Relationship Status (please be truthful):</label></td>
                <td>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>

                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                </td>
            </tr>
            <tr>
                <td><label for="favsong">Favorite Justin Songs: </label></td>
                <td>
                    <select id='favsong' name="favsong">
                        <option value="Sorry">Sorry</option>
                        <option value="Baby" selected>Baby</option>
                        <option value="Boyfriend">Boyfriend</option>
                        <option value="Let Me Love You">Let Me Love You</option>
                        <option value="I Don't Care">I Don't Care</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="comment">Message to Justin:</label></td>
                <td>
                    <textarea id="comment" name="comment" rows="4" cols="30">Your message to Justin... </textarea>
                </td>
            </tr>
            <tr>
                <td><button type="submit">Send My Love to Justin!</button></td>
            </tr>
        </table>

    </form>

    <!-- Hyperlink BACK to justin.html -->
    <!-- <hr> is a Horizontal Line element - it spans 100% across the width of the browser window -->
    <hr>
    <a href="../justin.html">Back </a>to Justin Fan Page

</body>

</html>
