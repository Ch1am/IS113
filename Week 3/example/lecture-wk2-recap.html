       /*
          Task:
              implement replaceANumber(arr, numberToFind, numberToReplace) below so that it
                  1. checks if arr is an array. If arr is not an array, return null
                  2.  checks if numberToFind exists in arr
                  3. if yes, replace numberToFind with numberToReplace
                  4. return the modified arr (in which numberToFind was replaced with numberToReplace )
              Hint: explore isArray, includes, indexOf, splice, slice
       */
      function replaceANumber(arr, numberToFind, numberToReplace) {

            // add code here
            if (Array.isArray(arr)){
              if (arr.includes(numberToFind)){
                let x = arr.indexOf(numberToFind)
                arr[x] = numberToReplace
                return arr
              }
              else{
                return arr
              }
            }
            else{
              return null
            }
           
            return null
      }
      console.log(replaceANumber("not an array", 40, 45)) // => null
      console.log(replaceANumber([10, 20, 30, 40, 50], 40, 45)) // => [10, 20, 30, 45, 50]
      console.log(replaceANumber([10, 20, 30, 40, 50], 60, 65)) // => [10, 20, 30, 40, 50]

      let squares = aNums.map((x) => x ** 2);

      let squareOfIndices = aNums.map((value, index, arr) => {
