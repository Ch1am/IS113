<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <form action="/account/register" method="post">
        <label for="user">Username: </label><br><input type="text" name="user" id="user"><br>
        
        <label for="email">Email: </label><br><input type="email" name="email" id="email"><br>
        
        <label for="password">Password:</label><br><input type="password" name="password" id="password"><br>
        
        <label for="confirmPassword">Confirm Password:</label><br><input type="password" name="confirmPassword" id="confirmPassword"><br>

        <button type="submit">Register</button>
    </form>
</body>
</html>
