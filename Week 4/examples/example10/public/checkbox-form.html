<html>
  <head>
    <title>Checkbox From Input Validation Example</title>
  </head>
  <body>
    <form action="/process-form" method="post">
      What topics do you like:<br><br>
      <input type="checkbox" name="topics" value="Art">
      Art
      <input type="checkbox" name="topics" value="Science">
      Science
      <input type="checkbox" name="topics" value="Tech">
      Technology
      <br><br>
      <button type="submit">Send</button>
    </form>
  </body>
</html>
