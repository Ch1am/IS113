<!DOCTYPE html>
<html>
    <head>
        <title>Compute Bus Fare in Far Far Away Land</title>
    </head>
    <body>
        <h2>Enter details</h2>
        <form action="/bus-fare" method="post">

             <!--START YOUR CODE HERE  -->  
            Distance (in km): 
            <input type="text" name="distance" size="5" ><br>
            Age group: 
                <select name="ageGroup">
                    <option value="children"><12</option>
                    <option value="others" selected>12-60</option>
                    <option value="senior">>60</option>
                </select><br/>
            Time: 
            <input type="radio" name="time" value="Peak" checked>Peak
            <input type="radio" name="time" value="Non-Peak">Non-Peak<br>
            <button type="submit">Compute Fare</button>

           <!--END YOUR CODE HERE  -->
        
        </form>
    </body>


    
</html>
