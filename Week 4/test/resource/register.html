<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration</title>
</head>
<body>
    <!-- Add Code Below -->
    <h1>Course Registration Form</h1>
    <img src="./img/register.jpeg" alt="register">

    <form method="get" action="/register">
        <!-- Add/Modify Code below -->

        <table border="1">
            <thead>
                <th>Course Code</th>
                <th>Course Name</th>
                <th>Register?</th>
            </thead>
            <tbody>
                <tr>
                    <td>IS113</td>
                    <td>Web Application Development I</td>
                    <td><input type="checkbox" id="course" name="course" value="is113"></td>
                </tr>
                <tr>
                    <td>IS216</td>
                    <td>Web Application Development II</td>
                    <td><input type="checkbox" id="course" name="course" value="is216"></td>
                </tr>
                <tr>
                    <td>CS440</td>
                    <td>Foundations of Cybersecurity</td>
                    <td><input type="checkbox" id="course" name="course" value="cs440"></td>
                </tr>
            </tbody>
        </table>

        <hr>
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name">
        <br>
        <label for="sid">Student ID:</label>
        <input type="number" id="sid" name="sid">
        <br>
        <label for="email">Email: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </label>
        <input type="email" id="email" name="email">
        <br>
        <button type="submit">Register</button>

        
    </form>
</body>
</html>
