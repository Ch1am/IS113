<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Q3A Transport Form</title>
</head>
<body>
  <h1>Select Transport Options</h1>

  <form method="POST" action="/q3a-display">
    <label>
      <input type="checkbox" name="transport" value="bus" />
      Bus
    </label>
    <br />

    <label>
      <input type="checkbox" name="transport" value="train" />
      Train
    </label>
    <br />

    <label>
      <input type="checkbox" name="transport" value="taxi" />
      Taxi
    </label>
    <br /><br />

    <button type="submit">Submit</button>
  </form>
</body>
</html>
